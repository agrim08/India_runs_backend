ai_usage_summary: |
  Used Google Antigravity (Gemini 3.1 pro) and Claude Sonnet 4.6 for code generation, system design, and debugging. Used for building the offline ranking pipeline, designing the penalty constraints (honeypot/consulting), and creating the frontend React components. No candidate data was fed to any LLM during the offline ranking pipeline.


methodology_summary: |
  Two-stage hybrid ranking pipeline prioritizing semantic alignment and deterministic rule-based modifiers. 
  Stage 1 computes fast deterministic pre-scores (skill matching, years of experience, seniority) for all 100K candidates.
  Stage 2 performs heavy semantic encoding (using sentence-transformers all-MiniLM-L6-v2) only on the top 3,000 candidates to extract deep JD context matching.
  Final scores apply multiplicative penalties to filter out honeypot profiles (overlapping dates, expert skills with 0 months), heavily consulting-only backgrounds, and unresponsive candidates. Runtime is ~2.8 minutes for 100K candidates on a standard CPU.


